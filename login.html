<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portals Login | Elyon Montessori</title>
  <link rel="icon" type="image/png" href="image/favicon2.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --blue: #003366;
      --gold: #FFC107;
      --light: #f8f9fa;
      --success: #28a745;
      --white: #ffffff;
      --dark: #0a0a2a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #d1d8e0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
      width: 100%;
    }

    nav {
      width: 100%;
      padding: 14px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(0, 51, 102, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-left img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255, 255, 255, 0.4);
      background: white;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: var(--white);
    }

    .nav-links {
      display: flex;
      gap: 14px;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--white);
      font-weight: 600;
      padding: 10px 16px;
      border-radius: 30px;
      transition: 0.3s;
      background: rgba(255, 255, 255, 0.1);
    }

    .nav-links a:hover,
    .nav-links a.active {
      background: var(--gold);
      color: #000;
    }

    .menu-toggle {
      display: none;
      font-size: 28px;
      color: white;
      cursor: pointer;
    }

    .login-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 50px 20px;
    }

    .portal-selection {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      width: 100%;
      max-width: 1000px;
    }

    .portal-card {
      background: white;
      border-radius: 15px;
      padding: 30px 20px;
      width: 280px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
      transition: 0.3s;
      border-top: 5px solid #ccc;
    }

    .portal-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
    }

    .portal-card i {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    .login-form-container {
      display: none;
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .login-form-container h2 {
      color: var(--blue);
      margin-bottom: 20px;
    }

    .login-form-container input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    .login-form-container button {
      width: 100%;
      padding: 14px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 15px;
    }

    .back-btn {
      background: #f1f1f1;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 45px !important;
    }

    .password-wrapper i {
      position: absolute;
      right: 15px;
      top: 18px;
      cursor: pointer;
      color: #666;
    }

    @media (max-width: 900px) {
      .menu-toggle {
        display: block;
      }

      .nav-links {
        display: none;
        position: absolute;
        top: 100%;
        right: 5%;
        width: 240px;
        background: rgba(0, 51, 102, 0.96);
        border-radius: 15px;
        padding: 15px;
        flex-direction: column;
      }

      .nav-links.show {
        display: flex;
      }
      
      .login-container {
        padding: 30px 10px;
      }
    }

    @media (max-width: 500px) {
      .logo {
        font-size: 16px;
      }

      .nav-left img {
        width: 50px;
        height: 50px;
      }

      .portal-card {
        width: 100%;
        max-width: 320px;
        margin: 0 auto;
      }
    }
  </style>
</head>

<body>
  <nav>
    <div class="nav-left"><img id="schoolLogo" src="image/logo.jpeg" alt="school logo">
      <div class="logo">ELYON MONTESSORI</div>
    </div>
    <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    <div class="nav-links" id="navLinks"><a href="index.html">Home</a><a href="login.html" class="active">Portals</a><a
        href="apply.html">Apply</a></div>
  </nav>
  <div class="login-container">
    <div class="portal-selection" id="portalSelection">
      <div class="portal-card" style="border-top-color:#e74c3c;" onclick="openLogin('admin')"><i
          class="fas fa-user-shield" style="color:#e74c3c;"></i>
        <h3>Admin</h3>
      </div>
      <div class="portal-card" style="border-top-color:var(--gold);" onclick="openLogin('teacher')"><i
          class="fas fa-chalkboard-teacher" style="color:var(--gold);"></i>
        <h3>Teacher</h3>
      </div>
      <div class="portal-card" style="border-top-color:var(--blue);" onclick="openLogin('student')"><i
          class="fas fa-user-graduate" style="color:var(--blue);"></i>
        <h3>Student</h3>
      </div>
      <div class="portal-card" style="border-top-color:#9b59b6;" onclick="openLogin('applicant')"><i
          class="fas fa-file-signature" style="color:#9b59b6;"></i>
        <h3>Applicant</h3>
      </div>
      <div class="portal-card" style="border-top-color:#27ae60;" onclick="openLogin('finance')"><i class="fas fa-wallet"
          style="color:#27ae60;"></i>
        <h3>Finance</h3>
      </div>
      <div class="portal-card" style="border-top-color:#8B0000;" onclick="openLogin('parent')"><i class="fas fa-users"
          style="color:#8B0000;"></i>
        <h3>Parent</h3>
      </div>
    </div>
    <div class="login-form-container" id="loginFormContainer">
      <button class="back-btn" onclick="goBack()">Back</button>
      <i id="formIcon" class="fas fa-user"
        style="font-size:3.5rem; color:var(--blue); margin-bottom:15px; display:block;"></i>
      <h2 id="formTitle">Login</h2>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <input type="hidden" id="loginRole"><input type="text" id="username" required>
        <div class="password-wrapper"><input type="password" id="password" required><i class="fas fa-eye"
            id="toggleIcon" onclick="togglePassword('password', 'toggleIcon')"></i></div>
        <button type="submit">Login</button>
      </form>
    </div>
  </div>
  <script src="js/database.js"></script>
  <script>
    function toggleMenu() { document.getElementById("navLinks").classList.toggle("show"); }
    function openLogin(r) {
      document.getElementById('portalSelection').style.display = 'none'; document.getElementById('loginFormContainer').style.display = 'block';
      document.getElementById('loginRole').value = r; document.getElementById('loginForm').reset();
      const t = document.getElementById('formTitle'); const i = document.getElementById('formIcon');
      if (r === 'admin') { t.innerText = 'Admin Login'; i.className = 'fas fa-user-shield'; i.style.color = '#e74c3c'; document.getElementById('username').placeholder = 'Admin ID'; }
      else if (r === 'teacher') { t.innerText = 'Teacher Login'; i.className = 'fas fa-chalkboard-teacher'; i.style.color = 'var(--gold)'; document.getElementById('username').placeholder = 'Teacher ID'; }
      else if (r === 'student') { t.innerText = 'Student Login'; i.className = 'fas fa-user-graduate'; i.style.color = 'var(--blue)'; document.getElementById('username').placeholder = 'Student ID'; }
      else if (r === 'applicant') { t.innerText = 'Applicant Login'; i.className = 'fas fa-file-signature'; i.style.color = '#9b59b6'; document.getElementById('username').placeholder = 'Email'; }
      else if (r === 'finance') { t.innerText = 'Finance Login'; i.className = 'fas fa-wallet'; i.style.color = '#27ae60'; document.getElementById('username').placeholder = 'Username'; }
      else if (r === 'parent') { t.innerText = 'Parent Login'; i.className = 'fas fa-users'; i.style.color = '#8B0000'; document.getElementById('username').placeholder = 'Phone/Email'; }
    }
    function goBack() { document.getElementById('loginFormContainer').style.display = 'none'; document.getElementById('portalSelection').style.display = 'flex'; }
    async function handleLogin(e) {
      e.preventDefault(); const r = document.getElementById('loginRole').value; const u = await DB.login(document.getElementById('username').value, document.getElementById('password').value);
      if (u && u.role === r) { window.location.href = r + '-portal.html'; } else alert("Invalid credentials.");
    }
    function togglePassword(i, c) {
      const input = document.getElementById(i); const icon = document.getElementById(c);
      if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
      else { input.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
    }
  </script>
</body>

</html>
