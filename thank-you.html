<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Elyon Montessori</title>
    <link rel="icon" type="image/png" href="image/favicon2.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #003366;
            --gold: #FFC107;
            --green: #28a745;
            --light: #f4f7f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .thank-you-card {
            background: white;
            padding: 60px 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.06);
            max-width: 550px;
            width: 100%;
            animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            border-bottom: 6px solid var(--blue);
        }

        /* Success Animation */
        .success-icon {
            width: 100px;
            height: 100px;
            background: rgba(40, 167, 69, 0.1);
            color: var(--green);
            font-size: 50px;
            line-height: 100px;
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: bounceIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h1 {
            color: var(--blue);
            margin-bottom: 15px;
            font-size: 2.2rem;
        }

        p {
            color: #666;
            line-height: 1.7;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .btn-home {
            text-decoration: none;
            background: var(--blue);
            color: white;
            font-weight: bold;
            padding: 16px 35px;
            border-radius: 12px;
            transition: 0.3s;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(0, 51, 102, 0.15);
        }

        .btn-home:hover {
            background: #002244;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 51, 102, 0.25);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            60% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="thank-you-card">
        <div class="success-icon">✓</div>
        <h1>Inquiry Received!</h1>
        <p>Thank you for reaching out to <strong>Elyon Montessori School</strong>. We have received your message, and
            our team will get back to you shortly.</p>

        <a href="index.html" class="btn-home">Back to Home</a>
    </div>

</body>

</html>
